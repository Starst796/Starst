<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- flask-socketio -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js" integrity="sha512-bLT0Qm9VnAYZDflyKcBaQ2gg0hSYNQrJ8RilYldYQ1FxQYoCLtUjuuRuZo+fjqhx/qtq/1itJ0C2ejDxltZVFg==" crossorigin="anonymous"></script>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script type="text/javascript" src="index.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starst联机系统 - 主页</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
    <script src="header-component.js" defer></script>
    <script src="static/js/global-bg.js"></script>
    <style>
    /* 全局背景图片容器 */
    #global-bg-image {
        position: fixed;
        top: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        background-size: cover;
        background-position: center center;
        background-repeat: no-repeat;
        pointer-events: none;
        transition: opacity 0.2s;
        opacity: 1;
    }

        .hero-section {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border-radius: 10px;
            margin-bottom: 40px;
        }
        
        .hero-section h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        
        .hero-section p {
            font-size: 1.2rem;
            max-width: 800px;
            margin: 0 auto 30px;
            opacity: 0.9;
        }
        
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }
        
        .feature-card {
            background: var(--panel-color);
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(var(--shadow-color), 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 250px;
        }
        
        .feature-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(var(--shadow-color), 0.15);
        }
        
        .feature-card:active {
            transform: scale(0.98);
        }
        
        .feature-icon {
            font-size: 3rem;
            margin-bottom: 20px;
            color: var(--primary-color);
        }
        
        .feature-card h3 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: var(--dark-color);
        }
        
        .feature-card p {
            color: #666;
            line-height: 1.6;
        }
        
        .feature-card.room {
            border-top: 5px solid var(--front-color);
        }
        
        .feature-card.match {
            border-top: 5px solid var(--success-color);
        }
        
        .feature-card.rank {
            border-top: 5px solid var(--warning-color);
        }
        
        .feature-card.shop {
            border-top: 5px solid var(--error-color);
        }
        
        .stats-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }
        
        .stat-card {
            background: var(--panel-color);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 3px 10px rgba(var(--shadow-color), 0.08);
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--front-color);
            margin-bottom: 10px;
        }
        
        .stat-label {
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <header-component></header-component>
    
    <div class="container">
        <!-- 英雄区域 -->
        <div class="hero-section">
            <h1>欢迎访问starst.site(卫戍协议ver.)</h1>
            <p>基于WebSocket的演示性联机系统、在线交流平台</p>
            <button id="get-started-btn" class="btn btn-accent" style="font-size: 1.2rem; padding: 12px 30px;">
                开始使用
            </button>
            <button id="get-info-btn" class="btn btn-secondary" style="font-size: 1.2rem; padding: 12px 30px;">
                关于项目
            </button>
            
        </div>
        
        <!-- 功能卡片 -->
         <div class="panel">
            <h2>快捷跳转</h2>
            <div class="features-grid">
                <div class="feature-card room" onclick="window.location.href='room.html'">
                    <div class="feature-icon">🏠</div>
                    <h3>房间</h3>
                    <p>创建或加入游戏房间，与好友组队游戏</p>
                </div>
                
                <div class="feature-card match" onclick="window.location.href='match.html'">
                    <div class="feature-icon">🎮</div>
                    <h3>匹配</h3>
                    <p>快速匹配玩家，寻找实力相当的对手</p>
                </div>
                
                <div class="feature-card rank" onclick="window.location.href='rank.html'">
                    <div class="feature-icon">🏆</div>
                    <h3>排行榜</h3>
                    <p>查看玩家排名，挑战更高段位</p>
                </div>
                
                <div class="feature-card shop" onclick="window.location.href='info.html'">
                    <div class="feature-icon">🔍</div>
                    <h3>关于</h3>
                    <p>了解项目详情和开发团队信息</p>
                </div>
            </div>
        </div>
        <!-- 统计信息 -->
        <div class="panel">
            <h2>平台数据</h2>
            <div class="stats-section">
                <div class="stat-card">
                    <div class="stat-number" id="online-users">0</div>
                    <div class="stat-label">在线用户</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="active-rooms">0</div>
                    <div class="stat-label">在线房间</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="total-users">0</div>
                    <div class="stat-label">总用户数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="total-rooms">0</div>
                    <div class="stat-label">总房间数</div>
                </div>
            </div>
        </div>
        

        <div class="panel">
            <h2>通知栏</h2>
            <div id="recent-updates">
                <p class="loading">正在加载公告...</p>
            </div>
        </div>

    </div>
    <div id="icp-info">ICP备案号：赣ICP备2026003192号</div> 
    <script>

        // 加载更新公告
        function loadRecentUpdates() {
            const updatesDiv = document.getElementById('recent-updates');
            if (!updatesDiv) return;
            fetch('updates.txt?_=' + Date.now())
                .then(res => {
                    if (!res.ok) throw new Error('加载失败');
                    return res.text();
                })
                .then(text => {
                    const lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
                    updatesDiv.innerHTML = '';
                    if (lines.length === 0) {
                        updatesDiv.innerHTML = '<p>暂无公告</p>';
                    } else {
                        const ul = document.createElement('ul');
                        lines.forEach(line => {
                            const li = document.createElement('li');
                            li.textContent = line;
                            ul.appendChild(li);
                        });
                        updatesDiv.appendChild(ul);
                    }
                })
                .catch(() => {
                    updatesDiv.innerHTML = '<p>公告加载失败</p>';
                });
        }

        document.addEventListener('DOMContentLoaded', function() {
            // 获取header组件
            const header = document.querySelector('header-component');
            // 检查登录状态
            const token = localStorage.getItem('token');
            const currentUser = localStorage.getItem('currentUser');
            if (token && currentUser) {
                header.updateUserInfo(JSON.parse(currentUser));
            }
            // 开始使用按钮
            document.getElementById('get-started-btn').addEventListener('click', function() {
                window.location.href = 'room.html';
            });

            document.getElementById('get-info-btn').addEventListener('click', function() {
                window.location.href = 'info.html';
            });

            // 获取在线人数并显示
            fetch('/api/online_count')
                .then(res => res.json())
                .then(data => {
                    if (data && typeof data.online_count === 'number') {
                        document.getElementById('online-users').textContent = data.online_count;
                    }
                })
                .catch(() => {
                    document.getElementById('online-users').textContent = '-';
                });

            // 加载更新公告
            loadRecentUpdates();
        });

        async function UpdateOnlineNumber(params) {
            try {
                const response = await fetch('/api/online_count');
                const data = await response.json();
                if (data && typeof data.online_count === 'number') {
                    document.getElementById('online-users').textContent = data.online_count;
                }
            } catch (error) {
                document.getElementById('online-users').textContent = '-';
            }
        }

        async function UpdateActiveRooms(params) {
            try {
                const response = await fetch('/api/active_rooms');
                const data = await response.json();
                if (data && typeof data.active_room_count === 'number') {
                    document.getElementById('active-rooms').textContent = data.active_room_count;
                }
            } catch (error) {
                document.getElementById('active-rooms').textContent = '-';
            }
        }

        async function UpdateTotalUsers(params) {
            try {
                const response = await fetch('/api/total_users');
                const data = await response.json();
                if (data && typeof data.total_user_count === 'number') {
                    document.getElementById('total-users').textContent = data.total_user_count;
                }
            } catch (error) {
                document.getElementById('total-users').textContent = '-';
            }
        }

        async function UpdateTotalRooms(params) {
            try {
                const response = await fetch('/api/total_rooms');
                const data = await response.json();
                if (data && typeof data.total_room_count === 'number') {
                    document.getElementById('total-rooms').textContent = data.total_room_count;
                }
            } catch (error) {
                document.getElementById('total-rooms').textContent = '-';
            }
        }

        let socket = null;

        // 未登录检查
        function checkLogin() {
            const token = localStorage.getItem('token');
            const currentPage = window.location.pathname.split('/').pop();
            const publicPages = ['index.html', 'login.html', ''];
            
            if (!token && !publicPages.includes(currentPage)) {
                window.location.href = 'login.html';
                return false;
            }
            return true;
        }
        
        // 页面加载时检查登录状态
        if (checkLogin()) {
            initSocketIO();
        }


        function initSocketIO() {
            socket = io();
            const currentToken = localStorage.getItem('token');
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            socket.on('connect', function() {
            console.log('SocketIO连接成功');
            
            // 加入匹配房间（房间0）
            socket.emit('join_room_zero', { token: currentToken }, function(response) {
                if (response && response.success) {
                    console.log('成功在其他界面加入房间0');
                }
                UpdateOnlineNumber(); // 连接成功后更新在线人数
                UpdateActiveRooms(); // 连接成功后更新活跃房间数
                UpdateTotalUsers(); // 连接成功后更新用户总数
                UpdateTotalRooms(); // 连接成功后更新房间总数
            });
            
            // 发送身份验证
            socket.emit('authenticate', { token: currentToken });
            });
            
            socket.on('disconnect', function() {
                console.log('SocketIO断开连接');
            });

            socket.on('update-online-users', function(data) {
                UpdateOnlineNumber();
             });
            
            socket.on('update-active-rooms', function(data) {
                UpdateActiveRooms();
            });
            
            socket.on('update-total-users', function(data) {
                UpdateTotalUsers();
            });

            socket.on('update-total-rooms', function(data) {
                UpdateTotalRooms();
            });
        }
    </script>
</body>
</html>

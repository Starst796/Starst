<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js" integrity="sha512-bLT0Qm9VnAYZDflyKcBaQ2gg0hSYNQrJ8RilYldYQ1FxQYoCLtUjuuRuZo+fjqhx/qtq/1itJ0C2ejDxltZVFg==" crossorigin="anonymous"></script>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script type="text/javascript" src="index.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starst联机系统 - 排行榜</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
    <script src="header-component.js" defer></script>
    <style>
        #global-bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            pointer-events: none;
            transition: opacity 0.2s;
            opacity: 1;
        }
        
        .rank-container {
            max-width: 1000px;
            margin: 20px auto;
        }
        
        .rank-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
        }
        
        .rank-tab {
            padding: 8px 20px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .rank-tab.active {
            background-color: var(--primary-color);
            color: white;
        }
        
        .rank-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--panel-color);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 10px rgba(var(--shadow-color),0.1);
        }
        
        .rank-table th {
            background-color: var(--primary-color);
            color: white;
            padding: 15px;
            text-align: left;
        }
        
        .rank-table td {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .rank-table tr:hover {
            background-color: rgba(var(--shadow-color),0.05);
        }
        
        .rank-number {
            font-weight: bold;
            font-size: 1.2rem;
            text-align: center;
            width: 60px;
        }
        
        .rank-1 {
            color: #FFD700;
        }
        
        .rank-2 {
            color: #C0C0C0;
        }
        
        .rank-3 {
            color: #CD7F32;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--primary-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 10px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
        }
        
        .rank-change {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        
        .rank-up {
            background-color: rgba(46, 204, 113, 0.2);
            color: var(--success-color);
        }
        
        .rank-down {
            background-color: rgba(231, 76, 60, 0.2);
            color: var(--error-color);
        }
        
        .rank-stable {
            background-color: rgba(149, 165, 166, 0.2);
            color: var(--gray-color);
        }
        
        .my-rank {
            background-color: rgba(74, 111, 165, 0.1);
            font-weight: bold;
        }
        
        .rank-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--panel-color);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 10px rgba(var(--shadow-color),0.05);
        }
        
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: var(--front-color);
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: var(--gray-color);
            font-size: 0.9rem;
        }
        
        .coming-soon {
            text-align: center;
            padding: 80px 20px;
            color: var(--gray-color);
        }
        
        .coming-soon h3 {
            margin-bottom: 20px;
            color: var(--front-color);
        }
    </style>
    <script src="static/js/global-bg.js"></script>
</head>
<body>
    <header-component></header-component>
    
    <div class="container">
        <div class="rank-container">
            <div class="panel">
                <h2>排行榜</h2>
                <div class="rank-tabs">
                    <div class="rank-tab active" data-type="top_creators">开创性选手</div>
                    <div class="rank-tab" data-type="top_joiners">补位大师</div>
                    <div class="rank-tab" data-type="top_online_time">网页享受者</div>
                    <div class="rank-tab" data-type="top_chat_users">压力服务器</div>
                </div>
                <div id="rank-table-container"></div>
            </div>
            
            <div class="panel">
                <h2>我的统计</h2>
                <div class="rank-stats">
                    <div class="stat-card">
                        <div class="stat-number">-</div>
                        <div class="stat-label">创建房间数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">-</div>
                        <div class="stat-label">加入房间数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">-</div>
                        <div class="stat-label">在线时长(分钟)</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">-</div>
                        <div class="stat-label">发言数量</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 获取header组件
            const header = document.querySelector('header-component');
            // 检查登录状态
            const token = localStorage.getItem('token');
            const currentUser = localStorage.getItem('currentUser');
            if (!token || !currentUser) {
                window.location.href = 'login.html';
                return;
            }
            header.updateUserInfo(JSON.parse(currentUser));

            // 获取个人统计数据
            fetch('/api/user/profile', {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                }
            })
            .then(res => res.ok ? res.json() : Promise.reject('获取个人数据失败'))
            .then(data => {
                if(data && data.user) {
                    const stats = [
                        data.user.created_room_count || 0,
                        data.user.joined_room_count || 0,
                        Math.floor((data.user.total_online_time || 0)/60),
                        data.user.chat_count || 0
                    ];
                    document.querySelectorAll('.stat-card .stat-number').forEach((el, idx) => {
                        el.textContent = stats[idx];
                    });
                }
            })
            .catch(err => {
                console.error(err);
            });
        });

        // 排行榜tab切换
        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('rank-tab')) {
                document.querySelectorAll('.rank-tab').forEach(tab => tab.classList.remove('active'));
                e.target.classList.add('active');
                renderRankTable(e.target.dataset.type);
            }
        });

        let rankingsData = null;

        async function fetchAndRenderRankings() {
            try {
                const response = await fetch('/api/rankings', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });
                if (response.ok) {
                    rankingsData = await response.json();
                    renderRankTable('top_creators');
                } else {
                    console.error('获取排行榜数据失败');
                }
            } catch (error) {
                console.error('获取排行榜数据出错:', error);
            }
        }
    

        function renderRankTable(type) {
            if (!rankingsData || !rankingsData[type]) {
                document.getElementById('rank-table-container').innerHTML = '<div style="color:#888;text-align:center;padding:40px;">暂无数据</div>';
                return;
            }
            const labelMap = {
                'top_creators': '创建房间数',
                'top_joiners': '加入房间数',
                'top_online_time': '在线时长(分钟)',
                'top_chat_users': '发言数量'
            };
            let html = `<table class="rank-table">
                <thead><tr><th>排名</th><th>用户</th><th>${labelMap[type]}</th></tr></thead><tbody>`;
            rankingsData[type].forEach((user, idx) => {
                let rankClass = idx === 0 ? 'rank-1' : idx === 1 ? 'rank-2' : idx === 2 ? 'rank-3' : '';
                let avatarUrl = user.id ? `/api/avatar/${user.id}/${user.image||0}` : '';
                html += `<tr>
                    <td class="rank-number ${rankClass}">${idx+1}</td>
                    <td><div class="user-info">
                        <img class="user-avatar" src="${avatarUrl}" onerror="this.src='default.png'" alt="头像">
                        <span>${user.nickname||user.username||'未知用户'}</span>
                    </div></td>
                    <td>`;
                if(type==='top_creators') html += user.created_room_count||0;
                else if(type==='top_joiners') html += user.joined_room_count||0;
                else if(type==='top_online_time') html += Math.floor((user.total_online_time||0)/60);
                else if(type==='top_chat_users') html += user.chat_count||0;
                html += `</td></tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('rank-table-container').innerHTML = html;
        }

        // 其余SocketIO和登录检查代码保持不变
        let socket = null;
        function checkLogin() {
            const token = localStorage.getItem('token');
            const currentPage = window.location.pathname.split('/').pop();
            const publicPages = ['index.html', 'login.html', ''];
            if (!token && !publicPages.includes(currentPage)) {
                window.location.href = 'login.html';
                return false;
            }
            return true;
        }
        if (checkLogin()) {
            initSocketIO();
            fetchAndRenderRankings();
        }
        function initSocketIO() {
            socket = io();
            const currentToken = localStorage.getItem('token');
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            socket.on('connect', function() {
                console.log('SocketIO连接成功');
                socket.emit('join_room_zero', { token: currentToken }, function(response) {
                    if (response && response.success) {
                        console.log('成功在其他界面加入房间0');
                    }
                });
                socket.emit('authenticate', { token: currentToken });
            });
            socket.on('disconnect', function() {
                console.log('SocketIO断开连接');
            });
        }
    </script>
</body>
</html>

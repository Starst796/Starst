    <script>
        color_history = [-1,-1,-1,-1,-1,-1]; //记录每个颜色上一次的原色，方便撤销时恢复
        document.addEventListener('DOMContentLoaded', function() {
                        // 自定义配色区逻辑
                        window.colorNames = [
                            {name:'primary', label:'主色', picker:'primary-color', btn2:'primary-back',btn:'primary-confirm'},
                            {name:'secondary', label:'副色', picker:'secondary-color',btn2:'secondary-back', btn:'secondary-confirm'},
                            {name:'accent', label:'强调色', picker:'accent-color',btn2:'accent-back', btn:'accent-confirm'},
                            {name:'front', label:'前景', picker:'front-color',btn2:'front-back', btn:'front-confirm'},
                            {name:'panel', label:'面板', picker:'panel-color',btn2:'panel-back', btn:'panel-confirm'},
                            {name:'background', label:'背景', picker:'background-color', btn2:'background-back', btn:'background-confirm'}
                        ];
                        window.colorNames.forEach((item, idx) => {
                            const picker = document.getElementById(item.picker);
                            const btn = document.getElementById(item.btn);
                            const btn2 = document.getElementById(item.btn2);
                            if (picker && btn) {
                                // 初始化picker显示当前colorlist
                                if (window.colorlist && window.colorlist[idx]) {
                                    if (item.name === 'background') {
                                        // background是rgb，转为hex显示
                                        picker.value = rgbToHex(window.colorlist[5]);
                                    } else {
                                        picker.value = window.colorlist[idx];
                                    }
                                }
                                btn.addEventListener('click', function() {
                                    let val = picker.value;
                                    // background特殊处理
                                    if (item.name === 'background') {
                                        color_history[5] = window.colorlist[5]; 
                                        window.colorlist[5] = hexToRgb(val);
                                    } else {
                                        color_history[idx] = window.colorlist[idx]; 
                                        window.colorlist[idx] = val;
                                    }
                                    // 调用header组件的customizeColors
                                    if (typeof customizeColors === 'function') {
                                        customizeColors(val, item.name);
                                    }
                                });
                                btn2.addEventListener('click', function() {
                                    let val = color_history[idx];
                                    if (val === -1) return; // 没有历史记录
                                    // background特殊处理
                                    if (item.name === 'background') {
                                        window.colorlist[5] = val;
                                        picker.value = rgbToHex(val);
                                    } else {
                                        window.colorlist[idx] = val;
                                        picker.value = val;
                                    }
                                });
                            }
                        });

                        // hex转rgb字符串
                        function hexToRgb(hex) {
                            hex = hex.replace('#','');
                            if (hex.length === 3) hex = hex.split('').map(x=>x+x).join('');
                            const r = parseInt(hex.substring(0,2),16);
                            const g = parseInt(hex.substring(2,4),16);
                            const b = parseInt(hex.substring(4,6),16);
                            return `${r},${g},${b}`;
                        }
                        // rgb字符串转hex
                        function rgbToHex(rgb) {
                            const arr = rgb.split(',').map(x=>parseInt(x));
                            if (arr.length!==3) return '#dcdcde';
                            return '#' + arr.map(x=>x.toString(16).padStart(2,'0')).join('');
                        }
            // 获取header组件

            //    return;
            //}

            const darkBtn = document.getElementById('dark-theme-btn');
            const defaultBtn = document.getElementById('default-theme-btn');
            const exportPaletteBtn = document.getElementById('export-palette');
            const importPaletteBtn = document.getElementById('import-palette');
            const loadCustom1Btn = document.getElementById('load-custom1');
            const saveCustom1Btn = document.getElementById('save-custom1');
            const loadCustom2Btn = document.getElementById('load-custom2');

            if (savedTheme === 'light') {

            } else if (savedTheme === 'dark') {

                if (lightBtn) lightBtn.style.display = '';
                if (darkBtn) darkBtn.style.display = '';
            }
            removeBgImageBtn.addEventListener('click', function() {

                    const tx = db.transaction('customStore', 'readwrite');
                    const store = tx.objectStore('customStore');
                    const req = store.delete('globalBgImage');
                    req.onsuccess = function() {
                        localStorage.removeItem('globalBgImage');
                        window.dispatchEvent(new StorageEvent('storage', {key:'globalBgImage'}));

                        db.close();
                    };
                    req.onerror = function() {
                        alert('背景图片移除失败');
                        db.close();
                    };
                });
            });
            exportPaletteBtn.addEventListener('click', function() {
                if (window.colorlist) {
                    // 用json记录theme、colorlist、图片和透明度
                    // 需要从IndexedDB读取图片数据
                    const data = {
                        theme: localStorage.getItem('theme'),
                        colorlist: window.colorlist,
                        globalBgImage: null, // 占位，后续填充
                        globalBgOpacity: localStorage.getItem('globalBgOpacity')
                    };
                    // 检查localStorage中globalBgImage是否为indexeddb
                    if (localStorage.getItem('globalBgImage') === 'indexeddb') {
                        loadBgImageFromDB(function(imgData) {
                            data.globalBgImage = imgData || null;
                            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data));

                            dlAnchorElem.setAttribute("href", dataStr);

                    } else {

            importPaletteBtn.addEventListener('click', function() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'application/json';
                input.onchange = function(e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = function(evt) {
                        try {
                            const data = JSON.parse(evt.target.result);
                            if (data.theme && data.colorlist) {

                                    setLightTheme();
                                    window.usingdark = false;
                                    if (lightBtn) lightBtn.style.display = 'none';
                                    if (darkBtn) darkBtn.style.display = '';
                                } else if (data.theme === 'dark') {
                                    setDarkTheme();
                                    window.usingdark = true;
                                    if (lightBtn) lightBtn.style.display = '';
                                    if (darkBtn) darkBtn.style.display = 'none';
                                }
                                // 恢复颜色数据
                                window.colorlist = data.colorlist;
                                // 根据colorlist更新六个picker颜色
                                colorNames.forEach((item, idx) => {
                                    const picker = document.getElementById(item.picker);
                                    if (picker && window.colorlist && window.colorlist[idx]) {
                                        if (item.name === 'background') {
                                            customizeColors(rgbToHex(window.colorlist[5]), 'background');
                                            picker.value = rgbToHex(window.colorlist[5]);
                                        } else {
                                            customizeColors(window.colorlist[idx], item.name);
                                            picker.value = window.colorlist[idx];
                                        }
                                    }
                                });
                                // 恢复全局背景图片和透明度
                                if (data.globalBgImage) {
                                    // 如果是dataURL，写入IndexedDB并设置localStorage为indexeddb
                                    if (typeof data.globalBgImage === 'string' && data.globalBgImage.startsWith('data:image/')) {
                                        saveBgImageToDB(data.globalBgImage, function(success) {
                                            if (success) {
                                                localStorage.setItem('globalBgImage', 'indexeddb');
                                                window.dispatchEvent(new StorageEvent('storage', {key:'globalBgImage'}));
                                            } else {
                                                alert('导入的背景图片写入数据库失败');
                                            }
                                        });
                                    } else {
                                        // 兼容旧格式
                                        localStorage.setItem('globalBgImage', data.globalBgImage);
                                        window.dispatchEvent(new StorageEvent('storage', {key:'globalBgImage'}));
                                    }
                                }
                                if (data.globalBgOpacity) {
                                    localStorage.setItem('globalBgOpacity', data.globalBgOpacity);
                                    window.dispatchEvent(new StorageEvent('storage', {key:'globalBgOpacity'}));
                                    const range = document.getElementById('bg-opacity-range');
                                    const value = document.getElementById('bg-opacity-value');
                                    if (range && value) {
                                        range.value = Math.round(Number(data.globalBgOpacity) * 100);
                                        value.textContent = `${Math.round(Number(data.globalBgOpacity) * 100)}%`;
                                    }
                                }
                            }
                        } catch (error) {
                            alert('导入的配色数据格式不正确');
                        }
                    };
                    reader.readAsText(file);
                };
                input.click();
            });


            // ====== IndexedDB工具函数 ======
            function openCustomDB(callback) {
                const request = indexedDB.open('starstCustomDB', 1);
                request.onupgradeneeded = function(event) {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains('customStore')) {
                        db.createObjectStore('customStore');
                    }
                };
                request.onsuccess = function(event) {
                    callback(event.target.result);
                };
                request.onerror = function() {
                    alert('无法打开自定义数据数据库');
                };
            }

            function saveCustomToDB(key, data, cb) {
                openCustomDB(function(db) {
                    const tx = db.transaction('customStore', 'readwrite');
                    const store = tx.objectStore('customStore');
                    const req = store.put(data, key);
                    req.onsuccess = function() {
                        if (cb) cb(true);
                        db.close();
                    };
                    req.onerror = function() {
                        if (cb) cb(false);
                        db.close();
                    };
                });
            }

            function loadCustomFromDB(key, cb) {
                openCustomDB(function(db) {
                    const tx = db.transaction('customStore', 'readonly');
                    const store = tx.objectStore('customStore');
                    const req = store.get(key);
                    req.onsuccess = function() {
                        cb(req.result);
                        db.close();
                    };
                    req.onerror = function() {
                        cb(null);
                        db.close();
                    };
                });
            }

                                    range.value = Math.round(Number(data.globalBgOpacity) * 100);
                                    value.textContent = `${Math.round(Number(data.globalBgOpacity) * 100)}%`;
                                }
                            }
                        }
                    } catch (error) {
                        alert('导入的配色数据格式不正确');
                    }
                });
            });
            if (lightBtn && darkBtn) {
                lightBtn.addEventListener('click', function() {
                    setLightTheme();
                    darkBtn.style.display = '';
                    lightBtn.style.display = 'none';
                    localStorage.setItem('customized', 'false');
                    window.usingdark = false;
                    //根据colorlist更新六个picker颜色
                    colorNames.forEach((item, idx) => {
                        const picker = document.getElementById(item.picker);
                        if (picker && window.colorlist && window.colorlist[idx]) {
                            if (item.name === 'background') {
                                picker.value = rgbToHex(window.colorlist[5]);
                            } else {
                                picker.value = window.colorlist[idx];
                            }
                        }
                    });
                });
                darkBtn.addEventListener('click', function() {
                    setDarkTheme();
                    lightBtn.style.display = '';
                    darkBtn.style.display = 'none';
                    localStorage.setItem('customized', 'false');
                    window.usingdark = true;
                    //根据colorlist更新六个picker颜色
                    colorNames.forEach((item, idx) => {
                        const picker = document.getElementById(item.picker);
                        if (picker && window.colorlist && window.colorlist[idx]) {
                            if (item.name === 'background') {
                                picker.value = rgbToHex(window.colorlist[5]);
                            } else {
                                picker.value = window.colorlist[idx];
                            }
                        }
                    });
                });

                defaultBtn.addEventListener('click', async function() {
                    localStorage.removeItem('theme');
                    localStorage.removeItem('customized');
                    window.colorlist = null;
                    await setDefaultTheme();
                    lightBtn.style.display = '';
                    darkBtn.style.display = 'none';
                });
            }

            // ====== 全局背景图片功能 ======
            // ========== 全局背景图片存储到IndexedDB ==========
            function saveBgImageToDB(dataUrl, cb) {
                openCustomDB(function(db) {
                    const tx = db.transaction('customStore', 'readwrite');
                    const store = tx.objectStore('customStore');
                    const req = store.put(dataUrl, 'globalBgImage');
                    req.onsuccess = function() { if (cb) cb(true); db.close(); };
                    req.onerror = function() { if (cb) cb(false); db.close(); };
                });
            }

            function loadBgImageFromDB(cb) {
                openCustomDB(function(db) {
                    const tx = db.transaction('customStore', 'readonly');
                    const store = tx.objectStore('customStore');
                    const req = store.get('globalBgImage');
                    req.onsuccess = function() { cb(req.result); db.close(); };
                    req.onerror = function() { cb(null); db.close(); };
                });
            }

            document.getElementById('bg-image-input').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(evt) {
                    // 存到IndexedDB
                    saveBgImageToDB(evt.target.result, function(success) {
                        if (success) {
                            // 兼容原有逻辑，localStorage只存一个标记
                            localStorage.setItem('globalBgImage', 'indexeddb');
                            // 主动触发storage事件
                            window.dispatchEvent(new StorageEvent('storage', {key:'globalBgImage'}));
                        } else {
                            alert('背景图片保存失败');
                        }
                    });
                };
                reader.readAsDataURL(file);
            });

            // 页面加载时自动从IndexedDB恢复背景图片
            function setBgImageFromDB() {
                loadBgImageFromDB(function(dataUrl) {
                    if (dataUrl) {
                        // 你需要根据你的global-bg.js或页面结构，设置背景图片
                        // 假设有id为global-bg-image的div
                        const bgDiv = document.getElementById('global-bg-image');
                        if (bgDiv) {
                            bgDiv.style.backgroundImage = `url('${dataUrl}')`;
                        }
                    }
                });
            }
            // 如果localStorage中globalBgImage为indexeddb，则用IndexedDB图片
            if (localStorage.getItem('globalBgImage') === 'indexeddb') {
                setBgImageFromDB();
            }
            // 透明度滑块
            document.getElementById('bg-opacity-range').addEventListener('input', function(e) {
                const v = Number(e.target.value) / 100;
                localStorage.setItem('globalBgOpacity', v);
                // 主动触发storage事件
                window.dispatchEvent(new StorageEvent('storage', {key:'globalBgOpacity'}));
                document.getElementById('bg-opacity-value').textContent = `${e.target.value}%`;
            });
            // 初始化滑块显示
            (function(){
                const opacity = localStorage.getItem('globalBgOpacity') || '1';
                const range = document.getElementById('bg-opacity-range');
                const value = document.getElementById('bg-opacity-value');
                if (range && value) {
                    range.value = Math.round(Number(opacity) * 100);
                    value.textContent = `${Math.round(Number(opacity) * 100)}%`;
                }
            })();
        });

        let socket = null;
        // 未登录检查
        function checkLogin() {
            const token = localStorage.getItem('token');
            const currentPage = window.location.pathname.split('/').pop();
            const publicPages = ['index.html', 'login.html', ''];
            //if (!token && !publicPages.includes(currentPage)) {
            //    window.location.href = 'login.html';
            //    return false;
            //}
            return true;
        }
        // 页面加载时检查登录状态
        if (checkLogin()) {
            initSocketIO();
        }

window.updatePickers = function() {
    colorNames.forEach((item, idx) => {
        const picker = document.getElementById(item.picker);
        if (picker && window.colorlist && window.colorlist[idx]) {
            if (item.name === 'background') {
                picker.value = rgbToHex(window.colorlist[5]);

};

        function initSocketIO() {
            socket = io();
            const currentToken = localStorage.getItem('token');

            console.log('SocketIO连接成功');

            // 发送身份验证

            socket.on('disconnect', function() {

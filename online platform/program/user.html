<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- flask-socketio -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js" integrity="sha512-bLT0Qm9VnAYZDflyKcBaQ2gg0hSYNQrJ8RilYldYQ1FxQYoCLtUjuuRuZo+fjqhx/qtq/1itJ0C2ejDxltZVFg==" crossorigin="anonymous"></script>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script type="text/javascript" src="index.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starst联机系统 - 我的</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
    <script src="header-component.js" defer></script>
    <script src="static/js/global-bg.js"></script>
    <style>
        #global-bg-image {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        background-size: cover;
        background-position: center center;
        background-repeat: no-repeat;
        pointer-events: none;
        transition: opacity 0.2s;
        opacity: 1;
    }
        .user-container {
            max-width: 800px;
            margin: 20px auto;
        }
        
        .user-profile {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--panel-color);
            border-radius: 8px;
            box-shadow: 0 2px 10px rgba(var(--shadow-color), 0.1);
        }
        
        .user-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: var(--primary-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
        }
        
        .user-info {
            flex: 1;
        }
        
        .user-name {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .user-username {
            color: var(--gray-color);
            margin-bottom: 10px;
        }
        
        .user-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--panel-color);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 10px rgba(var(--shadow-color), 0.1);
        }
        
        .stat-number {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--front-color);
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: var(--gray-color);
            font-size: 0.9rem;
        }
        
        .settings-section {
            margin-bottom: 30px;
        }
        
        .danger-zone {
            border: 2px solid var(--error-color);
            border-radius: 8px;
            padding: 20px;
            margin-top: 40px;
        }
        
        .danger-zone h3 {
            color: var(--error-color);
            margin-bottom: 15px;
        }
        
        .danger-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .form-row .form-group {
            flex: 1;
        }
        
        .password-requirements {
            font-size: 0.8rem;
            color: var(--gray-color);
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <header-component></header-component>
    
    <div class="container">
        <div class="user-container">
            <div class="panel">
                <h2>个人信息</h2>
                
                <div class="user-profile">
                    <label for="avatar-upload" style="cursor:pointer;">
                        <img class="user-avatar" id="user-avatar-img" src="../default.png" alt="头像" style="object-fit:cover;width:80px;height:80px;border-radius:50%;border:2px solid #eee;">
                        <input type="file" id="avatar-upload" accept="image/*" style="display:none;">
                    </label>
                    <div class="user-info">
                        <div class="user-name" id="user-name">加载中...</div>
                        <div class="user-username" id="user-username">@</div>
                        <div id="user-profile">这个人很懒，什么都没写</div>
                    </div>
                </div>
                <div>
                    <h2>数据统计</h2>
                </div>
                <div class="user-stats">
                    <div class="stat-card">
                        <div class="stat-number" id="stat-rooms">0</div>
                        <div class="stat-label">创建房间</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="stat-joined">0</div>
                        <div class="stat-label">加入房间</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="stat-playtime">0h</div>
                        <div class="stat-label">在线时长</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="stat-register">-</div>
                        <div class="stat-label">注册时间</div>
                    </div>
                </div>
            </div>
            
            <div class="panel settings-section">
                <h2>修改昵称</h2>
                <div class="notification hidden" id="nickname-notification"></div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="nickname-input">新昵称</label>
                        <input type="text" id="nickname-input" class="form-control" maxlength="20">
                        <small style="color: var(--gray-color);">昵称将显示给其他用户</small>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="updateNickname()">更新昵称</button>
            </div>
            
            <div class="panel settings-section">
                <h2>修改简介</h2>
                <div class="notification hidden" id="profile-notification"></div>
                
                <div class="form-group">
                    <label for="profile-input">个人简介</label>
                    <textarea id="profile-input" class="form-control" rows="3" maxlength="100"></textarea>
                    <small style="color: var(--gray-color);">介绍一下自己吧（最多100字）</small>
                </div>
                <button class="btn btn-primary" onclick="updateProfile()">更新简介</button>
            </div>
            
            <div class="panel settings-section">
                <h2>修改密码</h2>
                <div class="notification hidden" id="password-notification"></div>
                
                <div class="form-group">
                    <label for="current-password">当前密码</label>
                    <input type="password" id="current-password" class="form-control">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="new-password">新密码</label>
                        <input type="password" id="new-password" class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="confirm-password">确认新密码</label>
                        <input type="password" id="confirm-password" class="form-control">
                    </div>
                </div>
                <div class="password-requirements">密码至少6位字符，建议包含字母和数字</div>
                <button class="btn btn-warning" onclick="updatePassword()">修改密码</button>
            </div>
            
            <div class="danger-zone">
                <h3>⚠️ 危险操作</h3>
                <p>以下操作不可撤销，请谨慎操作</p>
                
                <div class="danger-actions">
                    <button class="btn btn-danger" onclick="logout()">退出登录</button>
                    <button class="btn btn-danger" onclick="deleteAccount()">注销账户</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 获取header组件
            const header = document.querySelector('header-component');
            
            // 检查登录状态
            const token = localStorage.getItem('token');
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            
            if (!token || !currentUser) {
                window.location.href = 'login.html';
                return;
            }
            
            header.updateUserInfo(currentUser);
            
            // 加载用户信息
            loadUserProfile();
            
            // 加载用户统计
            loadUserStats();
        });
        
        function loadUserProfile() {
            const token = localStorage.getItem('token');
            
            fetch('/api/user/profile', {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.user) {
                    const user = data.user;
                    
                    // 更新页面显示
                    document.getElementById('user-name').textContent = user.nickname;
                    document.getElementById('user-username').textContent = `@${user.username}`;

                    const avatarImg = document.getElementById('user-avatar-img');
                    if (user.image !== 0 && user.id !== undefined) {
                        avatarImg.src = `/api/avatar/${user.id}/${user.image}`;
                    } else {
                        avatarImg.src = '../default.png';
                    }
                    // 头像上传事件（带裁剪预览）
                    if (!avatarImg._uploadBinded) {
                        const avatarInput = document.getElementById('avatar-upload');
                        avatarInput.addEventListener('change', function() {
                            const file = avatarInput.files[0];
                            if (!file) {
                                avatarInput.value = '';
                                return;
                            }
                            showAvatarCropModal(file, function(croppedBlob) {
                                if (!croppedBlob) {
                                    avatarInput.value = '';
                                    return;
                                }
                                const formData = new FormData();
                                formData.append('avatar', croppedBlob, 'avatar.png');
                                const token = localStorage.getItem('token');
                                fetch('/api/upload_avatar', {
                                    method: 'POST',
                                    headers: {
                                        'Authorization': `Bearer ${token}`
                                    },
                                    body: formData
                                })
                                .then(res => res.json())
                                .then(data => {
                                    if (data.image !== undefined) {
                                        // 上传成功后刷新头像
                                        const user = JSON.parse(localStorage.getItem('currentUser'));
                                        user.image = data.image;
                                        localStorage.setItem('currentUser', JSON.stringify(user));
                                        avatarImg.src = `/api/avatar/${user.id}/${user.image}?t=${Date.now()}`;
                                    } else {
                                        alert('上传失败: ' + (data.message || '未知错误'));
                                    }
                                })
                                .catch(() => alert('上传失败'));
                                avatarInput.value = '';
                            });
                        });
                        avatarImg._uploadBinded = true;
                    }

                    // 头像裁剪弹窗实现
                    function showAvatarCropModal(file, callback) {
                        let modal = document.getElementById('avatar-crop-modal');
                        if (!modal) {
                            modal = document.createElement('div');
                            modal.id = 'avatar-crop-modal';
                            modal.style.position = 'fixed';
                            modal.style.top = '0';
                            modal.style.left = '0';
                            modal.style.width = '100vw';
                            modal.style.height = '100vh';
                            modal.style.background = 'rgba(0,0,0,0.5)';
                            modal.style.zIndex = '4000';
                            modal.style.display = 'flex';
                            modal.style.alignItems = 'center';
                            modal.style.justifyContent = 'center';
                            modal.innerHTML = `
                                <div style="background:#fff;padding:24px 24px 16px 24px;border-radius:12px;box-shadow:0 2px 16px #0003;max-width:95vw;max-height:95vh;display:flex;flex-direction:column;align-items:center;">
                                    <div style="margin-bottom:12px;font-size:1.1rem;">头像裁剪与预览</div>
                                    <canvas id="avatar-crop-canvas" width="320" height="320" style="background:#eee;border-radius:50%;box-shadow:0 1px 4px #0002;max-width:60vw;max-height:60vw;cursor:grab;"></canvas>
                                    <div style="margin:10px 0 0 0;font-size:0.95rem;color:#888;">可拖动图片，滚轮缩放，裁剪为圆形区域</div>
                                    <div style="margin-top:18px;display:flex;gap:18px;">
                                        <button id="avatar-crop-confirm-btn" class="btn btn-accent">确定</button>
                                        <button id="avatar-crop-cancel-btn" class="btn btn-secondary">取消</button>
                                    </div>
                                </div>
                            `;
                            document.body.appendChild(modal);
                        }
                        const canvas = modal.querySelector('#avatar-crop-canvas');
                        const ctx = canvas.getContext('2d');
                        let img = new window.Image();
                        let dragging = false, lastX = 0, lastY = 0;
                        let scale = 1, minScale = 0.2, maxScale = 4;
                        // minScale 动态计算，初始 scale 合理
                        function getMinScale() {
                            // 保证图片最小能覆盖裁剪区域
                            return Math.max(320 / imgW, 320 / imgH, 0.1);
                        }
                        let offsetX = 0, offsetY = 0;
                        let imgW = 0, imgH = 0;
                        // 读取图片
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            img.src = e.target.result;
                        };
                        img.onload = function() {
                            imgW = img.width;
                            imgH = img.height;
                            minScale = getMinScale();
                            scale = minScale; // 初始显示为最小缩放
                            offsetX = (320 - imgW * scale) / 2;
                            offsetY = (320 - imgH * scale) / 2;
                            draw();
                        };
                        reader.readAsDataURL(file);
                        // 绘制函数
                        function draw() {
                            ctx.clearRect(0, 0, 320, 320);
                            ctx.save();
                            ctx.beginPath();
                            ctx.arc(160, 160, 160, 0, Math.PI * 2);
                            ctx.closePath();
                            ctx.clip();
                            ctx.drawImage(img, offsetX, offsetY, imgW * scale, imgH * scale);
                            ctx.restore();
                            // 边框
                            ctx.save();
                            ctx.beginPath();
                            ctx.arc(160, 160, 158, 0, Math.PI * 2);
                            ctx.strokeStyle = '#aaa';
                            ctx.lineWidth = 2;
                            ctx.stroke();
                            ctx.restore();
                        }
                        // 拖动
                        // PC端拖动
                        canvas.onmousedown = function(e) {
                            dragging = true;
                            lastX = e.offsetX;
                            lastY = e.offsetY;
                            canvas.style.cursor = 'grabbing';
                        };
                        canvas.onmouseup = function() {
                            dragging = false;
                            canvas.style.cursor = 'grab';
                        };
                        canvas.onmouseleave = function() {
                            dragging = false;
                            canvas.style.cursor = 'grab';
                        };
                        canvas.onmousemove = function(e) {
                            if (!dragging) return;
                            const dx = e.offsetX - lastX;
                            const dy = e.offsetY - lastY;
                            offsetX += dx;
                            offsetY += dy;
                            lastX = e.offsetX;
                            lastY = e.offsetY;
                            draw();
                        };
                        // PC端缩放
                        canvas.onwheel = function(e) {
                            e.preventDefault();
                            const delta = e.deltaY < 0 ? 1.08 : 0.92;
                            const oldScale = scale;
                            scale *= delta;
                            minScale = getMinScale();
                            if (scale < minScale) scale = minScale;
                            if (scale > maxScale) scale = maxScale;
                            // 缩放中心为鼠标点
                            const mx = e.offsetX;
                            const my = e.offsetY;
                            offsetX = mx - (mx - offsetX) * (scale / oldScale);
                            offsetY = my - (my - offsetY) * (scale / oldScale);
                            draw();
                        };
                        // 移动端拖动和缩放
                        let lastTouchDist = null;
                        let lastTouchMid = null;
                        canvas.addEventListener('touchstart', function(e) {
                            if (e.touches.length === 1) {
                                dragging = true;
                                lastX = e.touches[0].clientX - canvas.getBoundingClientRect().left;
                                lastY = e.touches[0].clientY - canvas.getBoundingClientRect().top;
                                canvas.style.cursor = 'grabbing';
                            } else if (e.touches.length === 2) {
                                dragging = false;
                                // 记录双指距离和中点
                                const t1 = e.touches[0], t2 = e.touches[1];
                                lastTouchDist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
                                lastTouchMid = {
                                    x: (t1.clientX + t2.clientX) / 2 - canvas.getBoundingClientRect().left,
                                    y: (t1.clientY + t2.clientY) / 2 - canvas.getBoundingClientRect().top
                                };
                            }
                        }, { passive: false });
                        canvas.addEventListener('touchmove', function(e) {
                            if (e.touches.length === 1 && dragging) {
                                e.preventDefault();
                                const x = e.touches[0].clientX - canvas.getBoundingClientRect().left;
                                const y = e.touches[0].clientY - canvas.getBoundingClientRect().top;
                                const dx = x - lastX;
                                const dy = y - lastY;
                                offsetX += dx;
                                offsetY += dy;
                                lastX = x;
                                lastY = y;
                                draw();
                            } else if (e.touches.length === 2) {
                                e.preventDefault();
                                const t1 = e.touches[0], t2 = e.touches[1];
                                const dist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
                                const mid = {
                                    x: (t1.clientX + t2.clientX) / 2 - canvas.getBoundingClientRect().left,
                                    y: (t1.clientY + t2.clientY) / 2 - canvas.getBoundingClientRect().top
                                };
                                if (lastTouchDist && lastTouchMid) {
                                    let delta = dist / lastTouchDist;
                                    let oldScale = scale;
                                    scale *= delta;
                                    if (scale < minScale) scale = minScale;
                                    if (scale > maxScale) scale = maxScale;
                                    // 缩放中心为双指中点
                                    offsetX = mid.x - (mid.x - offsetX) * (scale / oldScale);
                                    offsetY = mid.y - (mid.y - offsetY) * (scale / oldScale);
                                    draw();
                                }
                                lastTouchDist = dist;
                                lastTouchMid = mid;
                            }
                        }, { passive: false });
                        canvas.addEventListener('touchend', function(e) {
                            if (e.touches.length === 0) {
                                dragging = false;
                                canvas.style.cursor = 'grab';
                                lastTouchDist = null;
                                lastTouchMid = null;
                            }
                        });
                        // 按钮
                        modal.querySelector('#avatar-crop-cancel-btn').onclick = function() {
                            modal.style.display = 'none';
                            if (callback) callback(null);
                        };
                        modal.querySelector('#avatar-crop-confirm-btn').onclick = function() {
                            // 导出裁剪结果
                            const outCanvas = document.createElement('canvas');
                            outCanvas.width = 320;
                            outCanvas.height = 320;
                            const outCtx = outCanvas.getContext('2d');
                            outCtx.save();
                            outCtx.beginPath();
                            outCtx.arc(160, 160, 160, 0, Math.PI * 2);
                            outCtx.closePath();
                            outCtx.clip();
                            outCtx.drawImage(img, offsetX, offsetY, imgW * scale, imgH * scale);
                            outCtx.restore();
                            outCanvas.toBlob(function(blob) {
                                modal.style.display = 'none';
                                if (callback) callback(blob);
                            }, 'image/png');
                        };
                        modal.style.display = 'flex';
                    }
                    
                    if (user.profile) {
                        document.getElementById('user-profile').textContent = user.profile;
                        document.getElementById('profile-input').value = user.profile;
                    }
                    
                    // 更新本地存储的用户信息
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    
                    // 更新header
                    const header = document.querySelector('header-component');
                    header.updateUserInfo(user);
                }
            })
            .catch(error => {
                console.error('加载用户信息错误:', error);
            });
        }
        
        function loadUserStats() {
            const token = localStorage.getItem('token');
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));

            document.getElementById('stat-rooms').textContent = currentUser.created_room_count || 0;
            document.getElementById('stat-joined').textContent = currentUser.joined_room_count || 0;
            //显示游戏时长
            game_time = currentUser.total_online_time 

            if (game_time > 3600) {
                game_time = game_time / 3600;
                game_time = game_time.toFixed(2);
                document.getElementById('stat-playtime').textContent = `${game_time} 小时`;
            } else {
                game_time = game_time / 60;
                game_time = game_time.toFixed(2);
                document.getElementById('stat-playtime').textContent = `${game_time} 分钟`;
            }

            if (currentUser && currentUser.created_at) {
                const registerDate = new Date(currentUser.created_at);
                document.getElementById('stat-register').textContent = 
                    `${registerDate.getFullYear()}-${registerDate.getMonth()+1}-${registerDate.getDate()}`;
            }
        }
        
        function updateNickname() {
            const newNickname = document.getElementById('nickname-input').value.trim();
            const notification = document.getElementById('nickname-notification');
            
            if (!newNickname) {
                showNotification(notification, '请输入新昵称！', 'error');
                return;
            }
            fetch('/api/user/nickname', {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${localStorage.getItem('token')}`
                },
                body: JSON.stringify({ nickname: newNickname })
            })
            .then(response => response.json())
            .then(data => {
                if (data.user) {
                    showNotification(notification, '昵称修改成功！', 'success');
                    loadUserProfile();
                } else {
                    showNotification(notification, data.message || '修改失败！', 'error');
                }
            })
            .catch(error => {
                console.error('修改昵称错误:', error);
                showNotification(notification, '网络错误，请稍后重试！', 'error');
            });
        }
        
        function updateProfile() {
            const newProfile = document.getElementById('profile-input').value.trim();
            const notification = document.getElementById('profile-notification');
            const token = localStorage.getItem('token');
            
            if (newProfile.length > 100) {
                showNotification(notification, '简介不能超过100字！', 'error');
                return;
            }
            
            fetch('/api/user/profile', {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ profile: newProfile })
            })
            .then(response => response.json())
            .then(data => {
                if (data.user) {
                    showNotification(notification, '简介修改成功！', 'success');
                    loadUserProfile();
                } else {
                    showNotification(notification, data.message || '修改失败！', 'error');
                }
            })
            .catch(error => {
                console.error('修改简介错误:', error);
                showNotification(notification, '网络错误，请稍后重试！', 'error');
            });
        }
        
        function updatePassword() {
            const currentPassword = document.getElementById('current-password').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const notification = document.getElementById('password-notification');
            
            if (!currentPassword || !newPassword || !confirmPassword) {
                showNotification(notification, '请填写所有密码字段！', 'error');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                showNotification(notification, '两次输入的新密码不一致！', 'error');
                return;
            }
            
            if (newPassword.length < 6) {
                showNotification(notification, '新密码至少需要6位字符！', 'error');
                return;
            }
            
            fetch('/api/user/password', {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${localStorage.getItem('token')}`
                },
                body: JSON.stringify({
                    current_password: currentPassword,
                    new_password: newPassword
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showNotification(notification, '密码修改成功！', 'success');
                    // 清空密码字段
                    document.getElementById('current-password').value = '';
                    document.getElementById('new-password').value = '';
                    document.getElementById('confirm-password').value = '';
                } else {
                    showNotification(notification, data.message || '修改失败！', 'error');
                }
            })
            .catch(error => {
                console.error('修改密码错误:', error);
                showNotification(notification, '网络错误，请稍后重试！', 'error');
            });
        }
        


        function logout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('token');
                localStorage.removeItem('currentUser');
                window.location.href = 'login.html';
            }
        }


        function deleteAccount() {
            if (confirm('⚠️ 警告：此操作不可撤销！\n\n确定要注销账户吗？所有数据将被永久删除！')) {
                const token = localStorage.getItem('token');
                fetch('/api/user/delete', {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.message) {
                        alert(data.message);
                        localStorage.removeItem('token');
                        localStorage.removeItem('currentUser');
                        window.location.href = 'login.html';
                    } else {
                        alert('账户注销失败！');
                    }
                })
                .catch(error => {
                    console.error('注销账户错误:', error);
                    alert('网络错误，请稍后重试！');
                });
            }
        }
        
        function showNotification(element, message, type) {
            element.textContent = message;
            element.className = 'notification ' + type;
            element.classList.remove('hidden');
            
            setTimeout(() => {
                element.classList.add('hidden');
            }, 3000);
        }
        let socket = null;
        // 未登录检查
        function checkLogin() {
            const token = localStorage.getItem('token');
            const currentPage = window.location.pathname.split('/').pop();
            const publicPages = ['index.html', 'login.html', ''];
            
            if (!token && !publicPages.includes(currentPage)) {
                window.location.href = 'login.html';
                return false;
            }
            return true;
        }
        
        // 页面加载时检查登录状态
        if (checkLogin()) {
            initSocketIO();
        }


        function initSocketIO() {
            socket = io();
            const currentToken = localStorage.getItem('token');
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            socket.on('connect', function() {
            console.log('SocketIO连接成功');
            
            // 加入匹配房间（房间0）
            socket.emit('join_room_zero', { token: currentToken }, function(response) {
                if (response && response.success) {
                    console.log('成功在其他界面加入房间0');
                }
            });
            
            // 发送身份验证
            socket.emit('authenticate', { token: currentToken });
            });
            
            socket.on('disconnect', function() {
                console.log('SocketIO断开连接');
            });


        }
    </script>
</body>
</html>

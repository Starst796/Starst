        async function startGame() {
            //弹窗提示
            confirm('此按钮并非真正的开始游戏按钮，而是改变游戏状态的显示。这个项目只是一个组队交流系统，实际的游戏仍需要通过可联机游戏本体进行实现。');

            if (!currentRoom || !isRoomCreator) return;
            status_circle = ['waiting', 'playing', 'finished','waiting'];
            status_title = ['开始游戏', '结束游戏', '重新等待','开始游戏'];
            status_class = ['btn btn-success', 'btn btn-danger', 'btn btn-secondary','btn btn-success'];
            for (let i = 0; i < status_circle.length; i++) {
                if (i === 3) break;
                if (currentRoom.game_status === status_circle[i]) {
                    try {
                        const response = await fetch(`/api/rooms/${currentRoom.id}/status`, {
                            method: 'PUT',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${currentToken}`
                            },
                            body: JSON.stringify({ game_status: status_circle[i + 1] })
                        });
                        
                        const data = await response.json();
                        
                        if (response.ok) {
                            currentRoom.game_status = status_circle[i + 1];
                            startGameBtn.textContent = status_title[i + 1];
                            startGameBtn.className = status_class[i + 1];
                            updateRoomInfo();
                        } else {
                            showNotification(roomNotification, data.message || '操作失败', 'error');
                        }
                    } catch (error) {
                        console.error('开始游戏错误:', error);
                        showNotification(roomNotification, '网络错误，请稍后重试', 'error');
                    }
                    break;
                }
            }
        }
        // 切换准备状态
        async function toggleReadyStatus() {
            confirm('此按钮并非真正的准备游戏，而是改变游戏状态的显示。这个项目只是一个组队交流系统，实际的游戏仍需要通过可联机游戏本体进行实现。');

            if (!currentRoom) return;
            
            try {
                const response = await fetch(`/api/rooms/${currentRoom.id}/toggle-ready`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${currentToken}`
                    }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    readyGameBtn.textContent = data.is_ready ? '取消准备' : '准备';
                    loadRoomMembers();
                    showNotification(roomNotification, data.message || '状态已更新', 'success');
                } else {
                    showNotification(roomNotification, data.message || '操作失败', 'error');
                }
            } catch (error) {
                console.error('切换准备状态错误:', error);
                showNotification(roomNotification, '网络错误，请稍后重试', 'error');
            }
        }
        
        // 离开房间
        async function leaveRoom() {
            if (!currentRoom) return;
            
            if (isRoomCreator) {
                if (!confirm('您确定要解散房间吗？所有成员将被移出房间。')) {
                    return;
                }
            } else {
                if (!confirm('确定要离开房间吗？')) {
                    return;
                }
            }
            
            // 先离开SocketIO房间
            if (insocketroomNow) {
                leaveSocketIORoom(currentRoom.id);
            }

            
            try {
                const response = await fetch(`/api/rooms/${currentRoom.id}/leave`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${currentToken}`
                    }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    currentRoom = null;
                    
                    // 更新"回到房间"按钮
                    updateBackToRoomButton();
                    
                    // 返回房间列表页面
                    showRoomListPage();
                    
                    // 刷新房间列表
                    loadRooms();
                    
                    showNotification(roomsNotification, data.message || '已离开房间', 'success');
                } else {
                    showNotification(roomNotification, data.message || '操作失败', 'error');
                }
            } catch (error) {
                console.error('离开房间错误:', error);
                showNotification(roomNotification, '网络错误，请稍后重试', 'error');
            }
        }
        // 返回房间列表
        function backToRoomList() {
            showRoomListPage();
        }
        
        // 加载聊天消息
        async function loadChatMessages() {
            if (!currentRoom) return;
            
            try {
                const response = await fetch(`/api/rooms/${currentRoom.id}/chat`, {
                    headers: {
                        'Authorization': `Bearer ${currentToken}`
                    }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    displayChatMessages(data.messages);
                    // 加载消息后隐藏新消息提示
                    hideNewMessageNotification();
                }
            } catch (error) {
                console.error('加载聊天消息错误:', error);
            }
        }
        
        // 检查用户是否在聊天框底部
        function checkIfUserAtBottom() {
            const threshold = 100; // 距离底部50px以内算作在底部
            return chatMessages.scrollTop + chatMessages.clientHeight >= chatMessages.scrollHeight - threshold;
        }
        
        // 显示新消息提示
        function showNewMessageNotification() {
            newMessageCountValue++;
            newMessageCount.textContent = newMessageCountValue;
            newMessageNotification.classList.remove('hidden');
        }
        
        // 隐藏新消息提示
        function hideNewMessageNotification() {
            newMessageCountValue = 0;
            newMessageNotification.classList.add('hidden');
        }
        
        // 滚动到底部并隐藏提示
        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
            hideNewMessageNotification();
            isUserAtBottom = true;
        }
        
        // 显示聊天消息
        function displayChatMessages(messages) {
            chatMessages.innerHTML = '';
            
            if (messages.length === 0) {
                chatMessages.innerHTML = '<div class="chat-message system"><div class="message-content">暂无聊天记录</div></div>';
                return;
            }
            
            messages.forEach(message => {
                addMessageToChat(message);
            });
            
            // 只有在用户已经在底部时才滚动到底部
            if (isUserAtBottom) {
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
        }
        
        // 发送聊天消息
        async function sendChatMessage() {
            if (!currentRoom) return;
            
            const content = chatInput.value.trim();
            
            if (!content) {
                showNotification(roomNotification, '消息不能为空', 'warning');
                return;
            }
            
            // 首先尝试通过SocketIO发送
            if (isSocketConnected) {
                const sentViaSocket = sendChatMessageViaSocketIO(content);
                if (sentViaSocket) {
                    // 清空输入框
                    chatInput.value = '';
                    return;
                }
            }
            
            // 如果SocketIO不可用，回退到HTTP请求
            console.log('SocketIO不可用，使用HTTP发送消息');
            try {
                const response = await fetch(`/api/rooms/${currentRoom.id}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}`
                    },
                    body: JSON.stringify({ content: content })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    chatInput.value = '';
                    // 如果是通过HTTP发送的，消息已经添加到数据库，需要手动添加到界面
                    if (data) {
                        addMessageToChat(data);
                    }
                } else {
                    showNotification(roomNotification, data.message || '发送失败', 'error');
                }
            } catch (error) {
                console.error('发送聊天消息错误:', error);
                showNotification(roomNotification, '网络错误，请稍后重试', 'error');
            }
        }

        
        function addMessageToChat(message) {
            if (!message) return;
            chatMessages.appendChild(createChatMessageDiv(message));
            // 检查用户是否在聊天框底部
            const isAtBottom = checkIfUserAtBottom();
            
            if (isAtBottom || message.user_id === currentUser.id) {
                // 如果用户在底部，自动滚动到底部
                chatMessages.scrollTop = chatMessages.scrollHeight;
            } else {
                // 如果用户不在底部，显示新消息提示
                showNewMessageNotification();
            }
        }
        
        // 显示通知
        function showNotification(element, message, type = 'error') {
            element.textContent = message;
            element.className = `notification ${type}`;
            element.classList.remove('hidden');
            
            setTimeout(() => {
                element.classList.add('hidden');
            }, 3000);
        }
        
        // 聊天消息滚动事件监听器
        chatMessages.addEventListener('scroll', function() {
            const isAtBottom = checkIfUserAtBottom();
            isUserAtBottom = isAtBottom;
            
            // 如果用户滚动到底部，隐藏新消息提示
            if (isAtBottom) {
                hideNewMessageNotification();
            }
        });
        
        // 新消息提示点击事件
        scrollToBottomLink.addEventListener('click', function(e) {
            e.preventDefault();
            scrollToBottom();
        });
        
        window.addEventListener('beforeunload', function() {
            
            // 断开SocketIO连接
            if (socket) {
                socket.disconnect();
            }
        });
    </script>
</body>
</html>
